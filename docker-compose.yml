services:
  db:
    image: mysql:8.0
    container_name: ecommerce-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecommerce}
      MYSQL_USER: ${MYSQL_USER:-ecommerce}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ecommerce123}
      MYSQL_CHARSET: utf8mb4
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  backend:
    build: ./backend
    container_name: ecommerce-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-ecommerce}
      DB_USER: ${DB_USER:-ecommerce}
      DB_PASSWORD: ${DB_PASSWORD:-ecommerce123}
      JWT_SECRET: ${JWT_SECRET:-ecommerce-jwt-secret-2024}
      PORT: ${BACKEND_PORT:-8227}
    ports:
      - "${BACKEND_HOST_PORT:-8227}:${BACKEND_PORT:-8227}"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ecommerce-frontend
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8227}
    ports:
      - "${FRONTEND_HOST_PORT:-3227}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
